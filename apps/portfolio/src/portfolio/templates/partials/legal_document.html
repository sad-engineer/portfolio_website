<section class="section-head">
    <h1>{{ legal_document.title }}</h1>
    <p class="muted">{{ legal_document.updatedAtText }}</p>
</section>

<section class="card legal legal-document">
    {% for block in legal_document.blocks %}
        {% if block.tag == "h1" %}
        <h1>{{ block.html | safe }}</h1>
        {% elif block.tag == "h2" %}
        <h2>{{ block.html | safe }}</h2>
        {% else %}
        <p>{{ block.html | safe }}</p>
        {% endif %}
    {% endfor %}
</section>
