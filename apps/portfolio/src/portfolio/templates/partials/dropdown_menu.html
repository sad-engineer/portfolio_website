<details class="dropdown-switcher {{ dropdown_class | default('') }}">
    <summary class="dropdown-switcher__trigger" aria-label="{{ dropdown_aria_label }}">
        <span class="dropdown-switcher__icon {{ dropdown_icon_class | default('') }}" aria-hidden="true"></span>
        {% if dropdown_show_arrow | default(false) %}
        <span class="dropdown-switcher__arrow {{ dropdown_arrow_class | default('') }}" aria-hidden="true"></span>
        {% endif %}
    </summary>
    <ul class="dropdown-switcher__menu {{ dropdown_menu_class | default('') }}">
        {% for item in dropdown_items %}
        <li><a href="{{ item.href }}">{{ item.label }}</a></li>
        {% endfor %}
    </ul>
</details>
